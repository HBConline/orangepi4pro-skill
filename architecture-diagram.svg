<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000044"/></filter>
    <linearGradient id="topbar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f0883e"/><stop offset="100%" stop-color="#f0a060"/></linearGradient>
    <linearGradient id="bannerG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#23863622"/><stop offset="100%" stop-color="#3fb95011"/></linearGradient>
  </defs>

  <rect width="900" height="720" rx="14" fill="#0f1117"/>

  <!-- ====== Board Card ====== -->
  <rect x="20" y="48" width="860" height="298" rx="16" fill="#161b22" stroke="#f0883e" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="36" width="280" height="24" rx="12" fill="url(#topbar)"/>
  <text x="170" y="53" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#000">🟠 Orange Pi 4 Pro — Debian/Ubuntu</text>

  <!-- User -->
  <circle cx="62" cy="100" r="18" fill="#1f6feb33" stroke="#1f6feb55" stroke-width="1"/>
  <text x="62" y="106" text-anchor="middle" font-size="16">👤</text>
  <rect x="90" y="76" width="500" height="48" rx="14" fill="#1f6feb15" stroke="#1f6feb44" stroke-width="1"/>
  <text x="108" y="97" font-family="system-ui,sans-serif" font-size="13" fill="#e6edf3">写一个边缘 AI 安防系统：MIPI 摄像头 + NPU</text>
  <text x="108" y="115" font-family="system-ui,sans-serif" font-size="13" fill="#e6edf3">行人检测，检测到人时触发警报、推送手机通知</text>

  <!-- Claude -->
  <circle cx="62" cy="170" r="18" fill="#bc8cff33" stroke="#bc8cff55" stroke-width="1"/>
  <text x="62" y="176" text-anchor="middle" font-size="16">🤖</text>
  <text x="90" y="164" font-family="system-ui,sans-serif" font-size="12" fill="#8b949e">Claude Code + orangepi4pro skill</text>
  <rect x="90" y="176" width="770" height="148" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Steps -->
  <circle cx="112" cy="204" r="11" fill="#3fb950"/><text x="112" y="208" text-anchor="middle" font-size="10" font-weight="700" fill="#000">1</text>
  <text x="132" y="208" font-family="system-ui,sans-serif" font-size="13" fill="#e6edf3">加载 MIPI 驱动 <tspan fill="#ffa657" font-family="monospace" font-size="12">modprobe vin_v4l2</tspan> → <tspan fill="#ffa657" font-size="12" font-family="monospace">/dev/video8</tspan></text>

  <circle cx="112" cy="230" r="11" fill="#3fb950"/><text x="112" y="234" text-anchor="middle" font-size="10" font-weight="700" fill="#000">2</text>
  <text x="132" y="234" font-family="system-ui,sans-serif" font-size="13" fill="#e6edf3">生成 C++ 源码：OpenCV 采集帧 → NPU 跑 YOLOv5s 行人检测 → <tspan fill="#ffa657" font-family="monospace" font-size="12">cmake && make -j4</tspan></text>

  <circle cx="112" cy="256" r="11" fill="#3fb950"/><text x="112" y="260" text-anchor="middle" font-size="10" font-weight="700" fill="#000">3</text>
  <text x="132" y="260" font-family="system-ui,sans-serif" font-size="13" fill="#e6edf3">检测到 <tspan fill="#f85149" font-weight="600">person</tspan> → GPIO <tspan fill="#ffa657" font-family="monospace" font-size="12">wPi 2 (Pin 7)</tspan> 触发蜂鸣器 + <tspan fill="#ffa657" font-family="monospace" font-size="12">paho-mqtt</tspan> 推送 JSON 告警</text>

  <circle cx="112" cy="282" r="11" fill="#3fb950"/><text x="112" y="286" text-anchor="middle" font-size="10" font-weight="700" fill="#000">4</text>
  <text x="132" y="286" font-family="system-ui,sans-serif" font-size="13" fill="#e6edf3">Flask 生成实时 Web 画面 + 告警日志 → <tspan fill="#ffa657" font-family="monospace" font-size="12">http://&lt;board_ip&gt;:8080</tspan></text>

  <circle cx="112" cy="308" r="11" fill="#3fb950"/><text x="112" y="312" text-anchor="middle" font-size="10" font-weight="700" fill="#000">5</text>
  <text x="132" y="312" font-family="system-ui,sans-serif" font-size="13" fill="#e6edf3">创建 <tspan fill="#ffa657" font-family="monospace" font-size="12">ai-guard.service</tspan> → <tspan fill="#3fb950" font-weight="600">systemctl enable --now</tspan> 开机自启</text>

  <!-- Result -->
  <rect x="90" y="340" width="770" height="32" rx="10" fill="url(#bannerG)" stroke="#23863655" stroke-width="1"/>
  <text x="475" y="361" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#3fb950">⚡ 10 分钟：从自然语言需求 → 完整的边缘 AI 安防系统上线</text>

  <!-- ====== Connector ====== -->
  <line x1="475" y1="375" x2="475" y2="410" stroke="#8b949e" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="469,406 475,418 481,406" fill="#8b949e"/>

  <!-- ====== Hardware Layer Label ====== -->
  <text x="475" y="438" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e" font-weight="600" letter-spacing="3">HARDWARE LAYER · 硬件层</text>

  <!-- ====== Column 1: MIPI Camera ====== -->
  <rect x="50" y="455" width="220" height="95" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="478" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e" font-weight="600" letter-spacing="2">MIPI-CSI 4-LANE</text>
  <text x="160" y="502" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" font-weight="700" fill="#e6edf3">OV13850 / IMX219</text>
  <text x="160" y="524" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#58a6ff">13MP / 8MP MIPI</text>
  <text x="160" y="542" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#f0883e">/dev/video8</text>

  <line x1="270" y1="502" x2="320" y2="502" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="316,497 326,502 316,507" fill="#8b949e"/>

  <!-- NPU -->
  <rect x="330" y="455" width="240" height="95" rx="12" fill="#161b22" stroke="#bc8cff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="478" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e" font-weight="600" letter-spacing="2">NEURAL PROCESSING UNIT</text>
  <text x="450" y="504" text-anchor="middle" font-family="system-ui,sans-serif" font-size="19" font-weight="700" fill="#bc8cff">3 TOPS NPU</text>
  <text x="450" y="528" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#58a6ff">YOLOv5s · person class</text>
  <text x="450" y="545" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#f0883e">Pegasus → NBG model</text>

  <!-- ====== Column 2: GPIO Buzzer ====== -->
  <rect x="50" y="570" width="220" height="85" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="595" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e" font-weight="600" letter-spacing="2">40-PIN GPIO</text>
  <text x="160" y="620" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" font-weight="700" fill="#e6edf3">Pin 7 / wPi 2</text>
  <text x="160" y="642" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#f85149">⚠ 3.3V 电平</text>

  <line x1="270" y1="612" x2="320" y2="612" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="316,607 326,612 316,617" fill="#8b949e"/>

  <!-- Buzzer -->
  <rect x="330" y="570" width="240" height="85" rx="12" fill="#161b22" stroke="#f85149" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="600" text-anchor="middle" font-size="28">🔊</text>
  <text x="450" y="628" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#f85149">Buzzer 蜂鸣器</text>
  <text x="450" y="648" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">有源 3.3V · 检测触发</text>

  <!-- ====== Column 3: WiFi/MQTT ====== -->
  <rect x="610" y="455" width="240" height="95" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="478" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e" font-weight="600" letter-spacing="2">WI-FI 6 · wlan0</text>
  <text x="730" y="504" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" font-weight="700" fill="#e6edf3">MQTT Alert</text>
  <text x="730" y="528" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#58a6ff">topic: home/camera/alert</text>
  <text x="730" y="545" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#f0883e">{ "person":1, "ts":"..." }</text>

  <!-- Phone -->
  <rect x="610" y="570" width="240" height="85" rx="12" fill="#161b22" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="600" text-anchor="middle" font-size="28">📱</text>
  <text x="730" y="628" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#3fb950">Phone Notification</text>
  <text x="730" y="648" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">Home Assistant · 手机推送</text>

  <!-- ====== Connecting lines between sections ====== -->
  <!-- NPU output → Buzzer (arrow) -->
  <path d="M420,550 L420,570" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- NPU output → MQTT (arrow) -->
  <path d="M570,502 L610,502" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="606,497 616,502 606,507" fill="#bc8cff"/>
  <!-- MQTT → Phone (arrow) -->
  <line x1="730" y1="550" x2="730" y2="570" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Footer -->
  <text x="450" y="698" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#484f58">Claude Code + orangepi4pro skill · github.com/HBConline/orangepi4pro-skill</text>
</svg>